<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVLY - Chill & Safe Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #0f172a;
            --soft-blue: #6366f1;
            --subtle-gray: #f1f5f9;
            --text-main: #1e293b;
            --nav-glass: rgba(15, 23, 42, 0.85); /* Màu Navy mờ ảo hòa quyện */
            --safe-green: #10b981;
        }

        body {
            margin: 0; background: #f8fafc; color: var(--text-main);
            font-family: 'Lexend', sans-serif; overflow-x: hidden;
        }

        /* --- HEADER SECTION --- */
        .header-section {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.3) 0%, var(--midnight) 100%), 
                        url('https://images.unsplash.com/photo-1514924013411-cbf25faa35bb?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            padding: 50px 20px 100px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
            text-align: center;
        }

        /* LOGO MOVLY - TO & THANH THOÁT */
        .logo-text {
            font-size: 46px; font-weight: 700; letter-spacing: 10px;
            color: #fff; text-transform: uppercase;
            opacity: 0.9;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            animation: softFloat 5s ease-in-out infinite;
            margin: 0;
        }

        @keyframes softFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome-box { margin-top: 15px; }
        .welcome-box b { font-size: 20px; color: rgba(255,255,255,0.9); font-weight: 300; }

        /* SMART DOCK - ƯU ĐÃI KHÔNG BỊ CHE */
        .smart-dock {
            position: absolute; bottom: -25px; left: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            z-index: 100; border: 1px solid rgba(255,255,255,0.8);
        }
        .smart-dock i { color: #f59e0b; font-size: 16px; }
        .smart-dock span { font-size: 13px; color: #64748b; }

        /* --- MAIN CONTENT --- */
        .main-content { margin-top: 60px; padding: 0 25px 140px; }

        /* NÚT ĐẶT XE - LINK LIÊN KẾT TRỌNG TÂM */
        .booking-container { margin-bottom: 30px; }
        .btn-booking {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: var(--midnight);
            padding: 22px; border-radius: 25px;
            text-decoration: none; color: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-booking:active { transform: scale(0.96); opacity: 0.9; }
        .btn-booking span { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        .btn-booking i { font-size: 18px; opacity: 0.8; }

        /* LƯỚI TÍNH NĂNG MỞ RỘNG */
        .quick-access {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 10px;
        }
        .access-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .icon-circle {
            width: 50px; height: 50px; background: #fff; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; color: #64748b; font-size: 18px;
            border: 1px solid #f1f5f9; transition: 0.3s;
        }
        .access-item:active .icon-circle { background: #f1f5f9; transform: scale(0.9); }
        .access-item span { font-size: 10px; color: #64748b; font-weight: 500; text-align: center; }

        /* --- BOTTOM NAV - HÒA QUYỆN VỚI WEB --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--nav-glass);
            backdrop-filter: blur(15px);
            height: 65px; border-radius: 22px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-link { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; font-size: 18px; }
        .nav-link.active { color: #fff; }
        .nav-link span { display: block; font-size: 9px; margin-top: 4px; opacity: 0.7; }

        /* Nút Đăng ký - Tinh tế không chói */
        .nav-link.register {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px; border-radius: 14px;
            color: #fff;
        }
    </style>
    <!-- =========================================================
     HỆ THỐNG CÀI ĐẶT (SETTINGS) - KHÔNG THAY ĐỔI CODE CŨ
     ========================================================= -->
<style>
    /* Panel cài đặt */
    #movly-settings-panel {
        position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
        background: white; z-index: 2000000; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 30px;
        font-family: 'Segoe UI', sans-serif;
    }
    #movly-settings-panel.active { right: 0; }
    
    .setting-item { margin-bottom: 25px; }
    .setting-item label { display: block; font-weight: bold; margin-bottom: 10px; color: #2d3436; }
    
    .setting-select {
        width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #eee;
        outline: none; cursor: pointer; background: #f8f9fa;
    }

    /* Dark Mode Global Overwrite */
    body.dark-theme { background-color: #1a1a1a !important; color: #ffffff !important; }
    body.dark-theme .search-wrapper, body.dark-theme .info-card { background: #2d2d2d !important; color: white !important; }
    
    /* Lớp phủ đen khi mở settings */
    #settings-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.3); backdrop-filter: blur(3px);
        display: none; z-index: 1999999;
    }
</style>
<style>
    /* Tối ưu hiển thị điện thoại */
@media (max-width: 768px) {
    /* Ngăn web bị xô lệch ngang */
    html, body {
        width: 100%;
        overflow-x: hidden;
        position: relative;
    }

    /* Phóng to các ô nhập liệu để ngón tay dễ bấm */
    input[type="text"], select, button {
        font-size: 16px !important; /* iPhone sẽ không bị tự động zoom màn hình khi gõ */
        height: auto;
        padding: 12px !important;
    }

    /* Điều chỉnh các bảng trượt (như bảng Settings hay Đánh giá) */
    #movly-settings-panel, #movly-full-modal > div {
        width: 85% !important; /* Chiếm gần hết chiều ngang điện thoại */
    }

    /* Nếu bạn có thanh menu dưới đáy (bottom bar) */
    .bottom-nav, .footer-menu {
        padding-bottom: 20px; /* Thêm khoảng trống cho các dòng máy tràn viền */
    }
}
</style>

<div id="settings-overlay" onclick="toggleMovlySettings()"></div>

<div id="movly-settings-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="margin: 0;">Cài đặt</h2>
        <span onclick="toggleMovlySettings()" style="cursor: pointer; font-size: 24px;">✕</span>
    </div>

    <!-- Cài đặt Ngôn ngữ -->
    <div class="setting-item">
        <label>🌐 Ngôn ngữ (15 quốc gia)</label>
        <select class="setting-select" id="language-selector">
            <option value="vi">Tiếng Việt</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="jp">日本語</option>
            <option value="kr">한국어</option>
            <option value="cn">中文</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
            <option value="it">Italiano</option>
            <option value="th">ไทย</option>
            <option value="pt">Português</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="nl">Nederlands</option>
            <option value="tr">Türkçe</option>
        </select>
    </div>

    <!-- Cài đặt Chế độ nền -->
    <div class="setting-item">
        <label>🌓 Chế độ hiển thị</label>
        <select class="setting-select" id="theme-selector" onchange="changeTheme()">
            <option value="light">☀️ Chế độ sáng (Mặc định)</option>
            <option value="dark">🌙 Chế độ tối (Dark Mode)</option>
        </select>
    </div>

    <!-- Cài đặt Âm thanh -->
    <div class="setting-item">
        <label>🔔 Thông báo</label>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: #2ecc71;">
            <span>Âm thanh ứng dụng</span>
        </div>
    </div>

    <button onclick="toggleMovlySettings()" style="width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer;">LƯU CÀI ĐẶT</button>
</div>
</head>
<body>

    <div class="header-section">

    <!-- BOTTOM NAV - SẮP XẾP LẠI VỊ TRÍ -->
    <nav class="bottom-nav">

        <a href="/settings" class="nav-link"><i class="fa-solid fa-sliders"></i><span>Cài đặt</span></a>
        
        <!-- Khám phá & Thông báo ở giữa -->
        <a href="/" class="nav-link active"><i class="fa-solid fa-house-user"></i><span>Khám phá</span></a>

        <!-- Đăng ký bên phải -->
        <a href="#" class="nav-link register"><i class="fa-solid fa-user-plus"></i><span>Đăng ký</span></a>
    </nav>

    <script>
        // Cập nhật lời chào theo thời gian
        const hr = new Date().getHours();
        const g = document.getElementById('greet');
        if (hr < 12) g.innerText = "Sáng nay bạn muốn đi đâu?";
        else if (hr < 18) g.innerText = "Chiều nay bạn đi đâu chill không?";
        else g.innerText = "Movly đưa bạn về nhà an toàn nhé!";
    </script>
    <!-- Dán đoạn này vào cuối file index.html, ngay trước thẻ </body> -->
<script>
function toggleMovlySettings() {
    const panel = document.getElementById('movly-settings-panel');
    const overlay = document.getElementById('settings-overlay');
    if (panel.classList.contains('active')) {
        panel.classList.remove('active');
        overlay.style.display = 'none';
    } else {
        panel.classList.add('active');
        overlay.style.display = 'block';
    }
}

function changeTheme() {
    const theme = document.getElementById('theme-selector').value;
    if (theme === 'dark') {
        document.body.classList.add('dark-theme');
    } else {
        document.body.classList.remove('dark-theme');
    }
}

// Lắng nghe sự kiện click vào nút "Cài đặt" trong thanh menu màu đen
document.addEventListener('DOMContentLoaded', () => {
    // Tìm nút có chữ "Cài đặt" hoặc icon bánh răng
    const settingsBtn = document.querySelector('.fa-cog')?.parentElement || 
                        document.querySelector('div[style*="cursor: pointer"]'); 
    
    // Cách an toàn nhất: bạn hãy thêm id="setting-btn" vào thẻ <div> chứa chữ "Cài đặt"
    const manualBtn = document.getElementById('setting-btn');
    
    if (manualBtn) {
        manualBtn.onclick = toggleMovlySettings;
    }
});
</script>
<!-- =========================================================
     MOVLY SETTINGS - PHIÊN BẢN FIX LỖI TRIỆT ĐỂ
     ========================================================= -->

<!-- 1. GIAO DIỆN SETTINGS -->
<div id="settings-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999998;" onclick="this.style.display='none'; document.getElementById('movly-panel').style.right='-350px';"></div>

<div id="movly-panel" style="position:fixed; top:0; right:-350px; width:300px; height:100%; background:white; z-index:999999; transition:0.4s; padding:25px; font-family:sans-serif; box-shadow:-5px 0 15px rgba(0,0,0,0.1);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:#2d3436;">Cài đặt</h3>
        <b style="cursor:pointer; font-size:20px;" onclick="document.getElementById('settings-overlay').click();">✕</b>
    </div>

    <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:bold;">🌐 Ngôn ngữ</label>
        <select style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <option>Tiếng Việt</option><option>English</option><option>日本語</option>
            <option>한국어</option><option>中文</option><option>Français</option>
            <option>Deutsch</option><option>Español</option><option>Русский</option>
            <option>Italiano</option><option>ไทย</option><option>Português</option>
            <option>Bahasa Indonesia</option><option>Nederlands</option><option>Trực Nhĩ Kỳ</option>
        </select>
    </div>

    <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:bold;">🌓 Chế độ nền</label>
        <select onchange="document.body.style.filter = this.value=='dark' ? 'invert(0.9) hue-rotate(180deg)' : 'none';" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <option value="light">☀️ Sáng</option>
            <option value="dark">🌙 Tối (Chill)</option>
        </select>
    </div>

    <button onclick="document.getElementById('settings-overlay').click();" style="width:100%; padding:12px; background:#2ecc71; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">LƯU THAY ĐỔI</button>
</div>

<!-- 2. LOGIC ĐIỀU KHIỂN (QUAN TRỌNG: NẰM TRONG SCRIPT) -->
<script>
    (function() {
        function showSettings() {
            document.getElementById('movly-panel').style.right = '0';
            document.getElementById('settings-overlay').style.display = 'block';
        }

        // Tự động quét tìm nút có chữ "Cài đặt"
        window.addEventListener('load', function() {
            const allElements = document.getElementsByTagName('div');
            for (let el of allElements) {
                if (el.innerText.trim() === "Cài đặt") {
                    el.style.cursor = "pointer";
                    el.onclick = function(e) {
                        e.preventDefault();
                        showSettings();
                    };
                }
            }
        });
    })();
</script>
<script>
    // 1. Hàm đóng/mở (Giữ nguyên logic cũ)
    function toggleMovlySettings() {
        const panel = document.getElementById('movly-settings-panel');
        const overlay = document.getElementById('settings-overlay');
        if (panel.style.right === '0px') {
            panel.style.right = '-350px';
            overlay.style.display = 'none';
        } else {
            panel.style.right = '0px';
            overlay.style.display = 'block';
        }
    }

    // 2. "ROBOT" TỰ TÌM NÚT (Đây là phần quan trọng nhất)
    window.addEventListener('load', function() {
        // Robot sẽ quét sạch tất cả các thẻ trên trang web của bạn
        const elements = document.querySelectorAll('div, span, a, p, li');
        
        elements.forEach(el => {
            // Nếu thấy thẻ nào chỉ chứa đúng chữ "Cài đặt"
            if (el.innerText.trim() === "Cài đặt") {
                el.style.cursor = "pointer"; // Biến thành hình bàn tay
                el.onclick = function(e) {
                    e.preventDefault();
                    toggleMovlySettings(); // Mở bảng cài đặt ngay
                };
            }
        });
    });
</script>

    }

html, body {

    position: fixed !important;
    right: -100% !important;
}
